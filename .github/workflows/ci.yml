name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  minimal-check-harnesses:
    runs-on: minimal-ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-minimal
      - name: Debug post-setup
        run: |
          echo "HOME=$HOME"
          echo "PATH=$PATH"
          which minimal 2>&1 || true
          ls -la $HOME/.minimal/ 2>&1 || true
          ls -la $HOME/.minimal/shim/bin/ 2>&1 || true
      - name: Check Harnesses
        run: minimal check --harnesses
